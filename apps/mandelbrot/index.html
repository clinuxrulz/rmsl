<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mandelbrot Explorer — RMSL Shader DSL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-glass: rgba(15, 23, 42, 0.75);
      --border-glass: rgba(255, 255, 255, 0.12);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent: #38bdf8;
      --accent-hover: #0284c7;
      --accent-active: #22c55e;
    }

    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
    }

    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #020617;
      font-family: 'Inter', sans-serif;
      color: var(--text-main);
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      touch-action: none;
    }

    .ui-panel {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 10;
      background: var(--bg-glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-glass);
      border-radius: 12px;
      padding: 20px;
      width: 320px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .ui-title {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: #fff;
    }

    .ui-badge {
      font-size: 0.68rem;
      font-weight: 600;
      background: rgba(56, 189, 248, 0.15);
      color: var(--accent);
      padding: 3px 8px;
      border-radius: 9999px;
      border: 1px solid rgba(56, 189, 248, 0.3);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .ui-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .ui-label {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
    }

    .ui-val {
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-main);
    }

    input[type="range"] {
      appearance: none;
      -webkit-appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: #334155;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      transition: transform 0.1s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    .btn {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--border-glass);
      color: var(--text-main);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.25);
    }

    .btn-toggle.active {
      background: rgba(34, 197, 94, 0.2);
      border-color: rgba(34, 197, 94, 0.4);
      color: #4ade80;
    }

    .hud-panel {
      position: absolute;
      bottom: 16px;
      left: 16px;
      z-index: 10;
      background: var(--bg-glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-glass);
      border-radius: 8px;
      padding: 10px 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--text-muted);
      display: flex;
      gap: 16px;
    }

    .hud-item {
      display: flex;
      gap: 6px;
    }

    .hud-item span {
      color: var(--text-main);
    }

    select {
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid var(--border-glass);
      color: var(--text-main);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 0.82rem;
      outline: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>

  <div class="ui-panel">
    <div class="ui-title">
      Mandelbrot <span class="ui-badge">RMSL GLSL</span>
    </div>

    <button id="precisionBtn" class="btn btn-toggle">
      <span>High Precision (2x Float32)</span>
    </button>

    <div class="ui-group">
      <div class="ui-label">
        <span>Max Iterations</span>
        <span id="iterVal" class="ui-val">256</span>
      </div>
      <input id="iterInput" type="range" min="32" max="2048" step="16" value="256" />
    </div>

    <div class="ui-group">
      <div class="ui-label">
        <span>Color Palette</span>
      </div>
      <select id="paletteSelect">
        <option value="0">Electric Cyan & Magenta</option>
        <option value="1">Fire & Gold</option>
        <option value="2">Deep Ocean Blue</option>
        <option value="3">Rainbow Spectrum</option>
      </select>
    </div>

    <button id="resetBtn" class="btn">
      Reset View
    </button>
  </div>

  <div class="hud-panel">
    <div class="hud-item">Zoom: <span id="hudZoom">1.0x</span></div>
    <div class="hud-item">Pan: <span id="hudPan">(-0.75, 0.00)</span></div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
